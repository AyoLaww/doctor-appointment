<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocBook | Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 0.25rem;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #1a73e8;
            border-bottom: 2px solid #1a73e8;
        }

        /* Forms */
        .form { display: none; }
        .form.active { display: block; }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.875rem;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #1a73e8;
        }

        /* Role toggle */
        .role-toggle {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .role-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
        }

        .role-btn.active {
            border-color: #1a73e8;
            background: #e8f0fe;
            color: #1a73e8;
        }

        /* Specialization field */
        .specialization-field {
            display: none;
        }

        .specialization-field.visible {
            display: block;
        }

        /* Error */
        .error {
            background: #fdecea;
            color: #c0392b;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        /* Submit button */
        .btn {
            width: 100%;
            padding: 0.8rem;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1558b0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DocBook</h1>
    <p class="subtitle">Your doctor appointment platform</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <form class="form active" id="login" method="POST" action="/login">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn">Login</button>
    </form>

    <!-- Register Form -->
    <form class="form" id="register" method="POST" action="/register">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>

        <!-- Role selection -->
        <div class="form-group">
            <label>I am a</label>
            <div class="role-toggle">
                <button type="button" class="role-btn active" onclick="selectRole('patient', this)">Patient</button>
                <button type="button" class="role-btn" onclick="selectRole('doctor', this)">Doctor</button>
            </div>
            <input type="hidden" name="role" id="role-input" value="patient" />
        </div>

        <!-- Specialization (doctors only) -->
        <div class="form-group specialization-field" id="specialization-field">
            <label>Specialization</label>
            <input type="text" name="specialization" placeholder="e.g. Cardiology" />
        </div>

        <button type="submit" class="btn">Create Account</button>
    </form>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        document.querySelectorAll('.form').forEach(f => {
            f.classList.toggle('active', f.id === tab);
        });
    }

    function selectRole(role, btn) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('role-input').value = role;

        const specField = document.getElementById('specialization-field');
        specField.classList.toggle('visible', role === 'doctor');
    }
</script>

</body>
</html>
